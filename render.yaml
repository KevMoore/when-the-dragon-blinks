# Render.com blueprint — deploys the game as a static site on the global CDN.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    runtime: static
    name: when-the-dragon-blinks
    buildCommand: npm install && npm run build:site
    staticPublishPath: ./public
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache

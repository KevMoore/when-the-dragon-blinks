<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#110711" />
  <title>When the Dragon Blinks</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="game-shell" aria-label="When the Dragon Blinks game">
    <canvas id="game" width="960" height="540"></canvas>
    <div id="rotate-overlay">
      <div class="rotate-card">
        <div class="eye-glyph"></div>
        <h1>Rotate Your Device</h1>
        <p>This shrine path is designed for landscape play.</p>
      </div>
    </div>
    <button id="touch-pause" data-action="pause" aria-label="Pause">❚❚</button>
    <div id="touch-controls" aria-label="Touch controls">
      <div id="stick-zone"></div>
      <div id="touch-stick">
        <span class="sdir up">AIM</span>
        <span class="sdir left">◀</span>
        <span class="sdir right">▶</span>
        <span class="sdir down">DUCK</span>
        <div id="stick-knob"></div>
      </div>
      <div class="touch-right">
        <button data-action="toggle" aria-label="Blink day and night">☯</button>
        <button data-action="attack" aria-label="Fire dragon-light">✦</button>
        <button data-action="jump" aria-label="Jump">▲</button>
      </div>
    </div>
  </main>
  <script type="module" src="dist/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Shrine Forge — Level Editor · When the Dragon Blinks</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #141019; --panel: #1c1524; --panel2: #241a30; --line: #372a44;
      --ink: #f3e9d2; --dim: #9a8fa8; --gold: #ffd777; --red: #d94a3a; --green: #3f7d4f;
    }
    * { box-sizing: border-box; margin: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg); color: var(--ink); font: 13px/1.4 -apple-system, "Segoe UI", Georgia, serif; }
    #app { display: grid; height: 100vh; grid-template: "top top top" 46px "rail stage insp" 1fr "foot foot foot" 26px / 54px 1fr 272px; }

    /* ---- top bar ---- */
    #top { grid-area: top; display: flex; align-items: center; gap: 8px; padding: 0 12px; background: var(--panel); border-bottom: 1px solid var(--line); }
    #top .brand { color: var(--gold); font-weight: 700; font-size: 15px; letter-spacing: .3px; margin-right: 8px; white-space: nowrap; }
    #top .grow { flex: 1; }
    .tbtn { background: var(--panel2); color: var(--ink); border: 1px solid var(--line); border-radius: 8px; padding: 5px 10px; font: 13px inherit; cursor: pointer; }
    .tbtn:hover { background: #2e2240; border-color: #4d3a60; }
    .tbtn.primary { background: var(--green); border-color: #58a06c; font-weight: 700; }
    .tbtn.danger:hover { background: #5a2020; }
    .zoomgrp { display: flex; gap: 4px; align-items: center; }
    #savedot { color: #58a06c; font-size: 10px; opacity: 0; transition: opacity .4s; }
    #savedot.on { opacity: 1; }

    /* ---- left tool rail ---- */
    #rail { grid-area: rail; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 0; background: var(--panel); border-right: 1px solid var(--line); overflow-y: auto; scrollbar-width: none; }
    #rail::-webkit-scrollbar { display: none; }
    .rbtn { width: 40px; height: 40px; display: grid; place-items: center; font-size: 19px; background: transparent; border: 1px solid transparent; border-radius: 10px; cursor: pointer; color: var(--ink); position: relative; }
    .rbtn:hover { background: var(--panel2); border-color: var(--line); }
    .rbtn.on { background: linear-gradient(150deg, #d94a3a, #a83227); border-color: var(--gold); box-shadow: 0 2px 10px rgba(217,74,58,.4); }
    .rbtn .tip { position: absolute; left: 50px; top: 50%; transform: translateY(-50%); background: #0d0912; border: 1px solid var(--line); border-radius: 8px; padding: 4px 10px; white-space: nowrap; font-size: 12px; opacity: 0; pointer-events: none; transition: opacity .12s; z-index: 40; }
    .rbtn:hover .tip { opacity: 1; }
    .rsep { width: 26px; height: 1px; background: var(--line); margin: 5px 0; flex: none; }

    /* ---- stage ---- */
    #stage { grid-area: stage; position: relative; overflow: hidden; background: #100c16; }
    #ed { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; cursor: grab; }
    #ed.tooling { cursor: crosshair; }
    #ed.grabbing { cursor: grabbing; }
    #hovertip { position: absolute; background: #0d0912; border: 1px solid var(--line); border-left: 3px solid var(--gold); border-radius: 8px; padding: 5px 10px; font-size: 12px; pointer-events: none; display: none; z-index: 30; white-space: nowrap; box-shadow: 0 6px 18px rgba(0,0,0,.45); }

    /* ---- inspector ---- */
    #insp { grid-area: insp; background: var(--panel); border-left: 1px solid var(--line); overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 14px; }
    .sec h3 { font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--dim); margin-bottom: 8px; }
    .sec .row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
    .sec label { color: var(--dim); font-size: 12px; }
    input[type=text], input[type=number], input[type=password], select { background: var(--panel2); color: var(--ink); border: 1px solid var(--line); border-radius: 8px; padding: 6px 8px; font: 13px inherit; width: 100%; }
    input[type=number] { width: 74px; }
    .sec .full { width: 100%; }
    .badge { display: inline-block; background: #4a2a12; border: 1px solid #a86a2a; color: var(--gold); border-radius: 8px; padding: 3px 8px; font-size: 11px; }
    .stampbtn { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left; background: var(--panel2); border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; color: var(--ink); cursor: pointer; margin-bottom: 6px; font: 13px inherit; }
    .stampbtn:hover { background: #2e2240; }
    .stampbtn.on { border-color: var(--gold); background: #3a2418; }
    .toggle { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; padding: 5px 10px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel2); }
    .toggle.on { border-color: var(--gold); color: var(--gold); }
    .actions .tbtn { width: 100%; margin-bottom: 6px; text-align: center; }

    /* ---- status bar ---- */
    #foot { grid-area: foot; display: flex; align-items: center; gap: 18px; padding: 0 12px; background: var(--panel); border-top: 1px solid var(--line); color: var(--dim); font-size: 12px; }
    #toolhint { flex: 1; text-align: right; }

    /* ---- modal + toasts ---- */
    .overlay { position: fixed; inset: 0; background: rgba(8,5,12,.75); display: none; place-items: center; z-index: 90; backdrop-filter: blur(3px); }
    .overlay.show { display: grid; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 20px 24px; max-width: 560px; width: min(560px, 92vw); box-shadow: 0 20px 60px rgba(0,0,0,.5); }
    .card h2 { color: var(--gold); font-size: 17px; margin-bottom: 10px; }
    .card p { margin-bottom: 8px; color: var(--ink); }
    .card .btns { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
    #toasts { position: fixed; right: 14px; bottom: 38px; display: flex; flex-direction: column; gap: 8px; z-index: 95; }
    .toast { background: #0d0912; border: 1px solid var(--line); border-left: 3px solid var(--gold); border-radius: 10px; padding: 9px 14px; box-shadow: 0 8px 24px rgba(0,0,0,.4); animation: tin .18s ease-out; }
    @keyframes tin { from { transform: translateY(8px); opacity: 0; } }
  </style>
</head>
<body>
  <div id="app">
    <header id="top">
      <div class="brand">⛩ Shrine Forge</div>
      <button class="tbtn" id="undo" title="Undo (Ctrl+Z)">↩︎</button>
      <button class="tbtn" id="redo" title="Redo (Ctrl+Y)">↪︎</button>
      <div class="zoomgrp">
        <button class="tbtn" id="zout" title="Zoom out">−</button>
        <button class="tbtn" id="zlvl" title="Reset zoom">100%</button>
        <button class="tbtn" id="zin" title="Zoom in">+</button>
        <button class="tbtn" id="zfit" title="Fit the whole level">⤢ Center</button>
      </div>
      <div class="grow"></div>
      <span id="savedot">● saved</span>
      <button class="tbtn primary" id="playtest">▶ Playtest</button>
      <button class="tbtn" id="publish">🚀 Publish</button>
    </header>
    <nav id="rail"></nav>
    <main id="stage"><canvas id="ed"></canvas><div id="hovertip"></div></main>
    <aside id="insp"></aside>
    <footer id="foot">
      <span id="coords">—</span>
      <span id="lvlinfo"></span>
      <span id="toolhint"></span>
    </footer>
  </div>

  <input id="file" type="file" accept=".json" style="display:none" />
  <div id="toasts"></div>

  <div class="overlay" id="confirm-overlay"><div class="card">
    <h2 id="confirm-title">Are you sure?</h2>
    <p id="confirm-body"></p>
    <div class="btns">
      <button class="tbtn" id="confirm-no">Cancel</button>
      <button class="tbtn primary" id="confirm-yes">Confirm</button>
    </div>
  </div></div>

  <div class="overlay" id="modal"><div class="card">
    <h2>Publish to the game</h2>
    <p>One click commits this level to the game repo — Render redeploys and it appears in <b>Level Select</b> (~2 min).</p>
    <div class="sec">
      <div class="row"><label style="width:70px">Token</label><input id="gh-token" type="password" placeholder="fine-grained PAT · Contents: read/write" /></div>
      <div class="row"><label style="width:70px">Repo</label><input id="gh-repo" type="text" value="KevMoore/when-the-dragon-blinks" /></div>
      <div class="row"><label style="width:70px">Branch</label><input id="gh-branch" type="text" value="main" style="width:110px" /></div>
    </div>
    <p style="color:var(--dim);font-size:12px">Token is stored only in this browser. Create one at github.com → Settings → Developer settings → Fine-grained tokens.</p>
    <p id="gh-status" style="color:#8fd9a8"></p>
    <div class="btns">
      <button class="tbtn" onclick="document.getElementById('modal').classList.remove('show')">Close</button>
      <button class="tbtn primary" id="gh-publish">🚀 Publish now</button>
    </div>
  </div></div>

  <script type="module" src="dist/editor.js"></script>
</body>
</html>
